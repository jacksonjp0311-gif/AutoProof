<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620"><rect width="1200" height="620" fill="#0b1020"/><rect x="40" y="35" width="1120" height="550" rx="24" fill="#111936" stroke="#27345e"/><text x="80" y="100" fill="#e9efff" font-family="Arial" font-size="36" font-weight="700">AutoProof</text><text x="80" y="135" fill="#91a3d8" font-family="Arial" font-size="18">Human-guided theorem proving, made tangible.</text><rect x="80" y="175" width="560" height="350" rx="14" fill="#0b1128"/><text x="110" y="225" fill="#aabaff" font-family="monospace" font-size="20">theorem add_zero (n : Nat) : n + 0 = n := by</text><text x="110" y="265" fill="#61d6b2" font-family="monospace" font-size="20">  simp</text><rect x="680" y="175" width="430" height="100" rx="14" fill="#1e2a51"/><text x="710" y="215" fill="#91a3d8" font-family="Arial" font-size="14">CURRENT GOAL</text><text x="710" y="248" fill="#fff" font-family="monospace" font-size="20">⊢ n + 0 = n</text><rect x="680" y="300" width="430" height="80" rx="14" fill="#173d3c"/><text x="710" y="335" fill="#6ee7c1" font-family="Arial" font-size="18" font-weight="700">simp</text><text x="710" y="360" fill="#bee9da" font-family="Arial" font-size="14">Uses standard natural-number simplification.</text><rect x="680" y="405" width="430" height="80" rx="14" fill="#1e2a51"/><text x="710" y="440" fill="#e9efff" font-family="Arial" font-size="18">Proof tree · Feedback · Counterexamples</text></svg>
